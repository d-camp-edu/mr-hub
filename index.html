        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        // setDoc 추가
        import { getFirestore, collection, addDoc, doc, setDoc, onSnapshot, updateDoc, getDocs, deleteDoc, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB475AzDr96EP6I7YsyZx3OjnYDMuMaq7k",
            authDomain: "diabetes-sales.firebaseapp.com",
            projectId: "diabetes-sales",
            storageBucket: "diabetes-sales.firebasestorage.app",
            messagingSenderId: "778615949732",
            appId: "1:778615949732:web:8783bfcb0a95ec15cbd931"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = "dm-team-mr-hub-v3"; 

        window.FB = { 
            db, auth, appId,

<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback } = React;

        // --- SVG 아이콘 컴포넌트 ---
        const Icon = ({ name, size = 20, className = "" }) => {
            const icons = {
                search: <g><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></g>,
                file: <g><path d="M13 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V9z" /><polyline points="13 2 13 9 20 9" /></g>,

                trash: <g><polyline points="3 6 5 6 21 6" /><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2" /></g>,
                lock: <g><rect x="3" y="11" width="18" height="11" rx="2" ry="2" /><path d="M7 11V7a5 5 0 0110 0v4" /></g>,

                youtube: <g><path d="M22.54 6.42a2.78 2.78 0 00-1.94-2C18.88 4 12 4 12 4s-6.88 0-8.6.46a2.78 2.78 0 00-1.94 2A29 29 0 001 11.75a29 29 0 00.46 5.33A2.78 2.78 0 003.4 19.1c1.72.46 8.6.46 8.6.46s6.88 0 8.6-.46a2.78 2.78 0 001.94-2 29 29 0 00.46-5.33 29 29 0 00-.46-5.33z" /><polygon points="9.75 15.02 15.5 11.75 9.75 8.48 9.75 15.02" /></g>,

                excel: <g><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z" /><polyline points="14 2 14 8 20 8" /><path d="M8 13h2v7H8zM12 15h2v5h-2zM16 11h2v9h-2z" /></g>,
                cart: <g><circle cx="9" cy="21" r="1" /><circle cx="20" cy="21" r="1" /><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6" /></g>,
                checkCircle: <g><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></g>,
                circle: <g><circle cx="12" cy="12" r="10" /></g>,
                building: <g><rect x="4" y="2" width="16" height="20" rx="2" ry="2" /><line x1="9" y1="22" x2="9" y2="2" /><line x1="15" y1="22" x2="15" y2="2" /><line x1="4" y1="6" x2="20" y2="6" /><line x1="4" y1="10" x2="20" y2="10" /><line x1="4" y1="14" x2="20" y2="14" /><line x1="4" y1="18" x2="20" y2="18" /></g>,
                finger: <g><path d="M2 12a10 10 0 0110-10" /><path d="M7 15a10 10 0 0110-10" /><path d="M12 18a10 10 0 0110-10" /><circle cx="12" cy="12" r="3" /></g>,
                copy: <g><rect x="9" y="9" width="13" height="13" rx="2" ry="2" /><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1" /></g>,
                database: <g><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></g>,
                edit: <g><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></g>,
                save: <g><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></g>,
                refresh: <g><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/></g>,
                plus: <g><line x1="12" y1="5" x2="12" y2="19" /><line x1="5" y1="12" x2="19" y2="12" /></g>,
                image: <g><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></g>,
                arrowUp: <g><polyline points="18 15 12 9 6 15"/></g>,
                arrowDown: <g><polyline points="6 9 12 15 18 9"/></g>,
                settings: <g><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></g>,
                close: <g><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></g>
            };
            return (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name]}
                </svg>
            );
        };

        const ADMIN_PASSWORD = "1024";

        const App = () => {
            const [user, setUser] = useState(null);
            
            // 로그아웃 시 데이터 휘발되도록 sessionStorage 사용
            const [empId, setEmpId] = useState(sessionStorage.getItem('mr_emp_id') || "");
            const [isLoggedIn, setIsLoggedIn] = useState(!!sessionStorage.getItem('mr_emp_id'));
            
            const [activeTab, setActiveTab] = useState("materials");
            
            // 데이터 상태
            const [messages, setMessages] = useState([]);
            const [requests, setRequests] = useState([]);
            const [inquiries, setInquiries] = useState([]);
            const [recentLogs, setRecentLogs] = useState([]);
            const [categoriesList, setCategoriesList] = useState([]);
            const [videoCategoriesList, setVideoCategoriesList] = useState([]);
            const [mrPassword, setMrPassword] = useState("1024");
            
            // UI 제어 상태
            const [searchQuery, setSearchQuery] = useState("");
            const [selectedCategory, setSelectedCategory] = useState("전체");
            const [isAdminMode, setIsAdminMode] = useState(false);
            const [showAdminLogin, setShowAdminLogin] = useState(false);
            const [passwordInput, setPasswordInput] = useState("");
            const [editingId, setEditingId] = useState(null);
            
            // 카테고리 수정 상태
            const [editingCategoryId, setEditingCategoryId] = useState(null);
            const [editingCategoryName, setEditingCategoryName] = useState("");
            
            // 입력 폼 상태
            const [loginEmpId, setLoginEmpId] = useState("");
            const [loginPassword, setLoginPassword] = useState("");
            const [formState, setFormState] = useState({ title: "", category: "", description: "", pdfUrl: "", pptUrl: "", youtubeUrl: "", thumbnail: "" });
            const [requestForm, setRequestForm] = useState({ brochureName: "", requesterName: "", phone: "", office: "", quantity: "", accountName: "", accountCode: "" });
            const [inquiryForm, setInquiryForm] = useState({ division: "", team: "", name: "", content: "" });
            const [newBrochureName, setNewBrochureName] = useState("");
            const [newCategoryName, setNewCategoryName] = useState("");
            const [newVideoCategoryName, setNewVideoCategoryName] = useState("");
            const [newMrPassword, setNewMrPassword] = useState("");

            useEffect(() => {
                const init = setInterval(() => {
                    if (window.FB) {
                        clearInterval(init);
                        const { auth, signInAnonymously, onAuthStateChanged } = window.FB;
                        signInAnonymously(auth).then(() => {
                            onAuthStateChanged(auth, setUser);
                        }).catch(err => console.error("Login Error:", err));
                    }
                }, 500);
            }, []);

            useEffect(() => {
                if (!user || !window.FB) return;
                const { db, appId, collection, doc, setDoc, onSnapshot } = window.FB;
                const base = `/artifacts/${appId}/public/data/`;

                // 시스템 설정 (MR 접속 암호)
                const unsubSettings = onSnapshot(doc(db, `${base}settings`, 'config'), (docSnap) => {
                    if (docSnap.exists()) {
                        const pwd = docSnap.data().mrPassword;
                        setMrPassword(pwd || "1024");
                        setNewMrPassword(pwd || "1024");
                    } else {
                        if (isAdminMode) setDoc(doc(db, `${base}settings`, 'config'), { mrPassword: "1024" }, { merge: true });
                    }
                });

                // 자료/영상
                const unsubMsg = onSnapshot(collection(db, `${base}messages`), (snap) => {
                    setMessages(snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => b.timestamp - a.timestamp));
                });

                // 브로슈어 신청
                const unsubReq = onSnapshot(collection(db, `${base}requests`), (snap) => {
                    setRequests(snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => b.timestamp - a.timestamp));
                });

                // 문의 건의 내역
                const unsubInq = onSnapshot(collection(db, `${base}inquiries`), (snap) => {
                    setInquiries(snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => b.timestamp - a.timestamp));
                });

                // 자료 카테고리
                const unsubCat = onSnapshot(collection(db, `${base}categories`), (snap) => {
                    let data = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    setCategoriesList(data.sort((a,b) => {
                        const orderA = a.order !== undefined ? a.order : Number.MAX_SAFE_INTEGER;
                        const orderB = b.order !== undefined ? b.order : Number.MAX_SAFE_INTEGER;
                        if (orderA === orderB) return a.timestamp - b.timestamp;
                        return orderA - orderB;
                    }));
                });

                // 영상 카테고리
                const unsubVidCat = onSnapshot(collection(db, `${base}videoCategories`), (snap) => {
                    let data = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    setVideoCategoriesList(data.sort((a,b) => {
                        const orderA = a.order !== undefined ? a.order : Number.MAX_SAFE_INTEGER;
                        const orderB = b.order !== undefined ? b.order : Number.MAX_SAFE_INTEGER;
                        if (orderA === orderB) return a.timestamp - b.timestamp;
                        return orderA - orderB;
                    }));
                });
                
                fetchRecentLogs();
                return () => { unsubSettings(); unsubMsg(); unsubReq(); unsubInq(); unsubCat(); unsubVidCat(); };
            }, [user, isAdminMode]);

            const fetchRecentLogs = useCallback(async () => {
                if (!user || !window.FB || !isAdminMode) return;
                const { db, appId, collection, getDocs, query, orderBy, limit } = window.FB;
                const logsRef = collection(db, `/artifacts/${appId}/public/data/logs`);
                const q = query(logsRef, orderBy("timestamp", "desc"), limit(50));
                const snap = await getDocs(q);
                setRecentLogs(snap.docs.map(d => ({id: d.id, ...d.data()})));
            }, [user, isAdminMode]);

            const logAction = async (action, target) => {
                if (!empId || !window.FB) return;
                await window.FB.addDoc(window.FB.collection(window.FB.db, `/artifacts/${window.FB.appId}/public/data/logs`), {
                    empId, action, target, timestamp: Date.now(), dateString: new Date().toLocaleString('ko-KR')
                });
            };

            const handleUserLogin = (e) => {
                e.preventDefault();
                if (!/^\d{6}$/.test(loginEmpId)) {
                    alert("사번 6자리를 숫자로 입력하세요.");
                    return;
                }
                if (loginPassword !== mrPassword) {
                    alert("접속 암호가 일치하지 않습니다.");
                    return;
                }
                sessionStorage.setItem('mr_emp_id', loginEmpId);
                setEmpId(loginEmpId);
                setIsLoggedIn(true);
                logAction("LOGIN", "시스템 접속");
            };

            const getReportText = async () => {
                const logSnap = await window.FB.getDocs(window.FB.collection(window.FB.db, `/artifacts/${window.FB.appId}/public/data/logs`));
                const reqSnap = await window.FB.getDocs(window.FB.collection(window.FB.db, `/artifacts/${window.FB.appId}/public/data/requests`));
                const inqSnap = await window.FB.getDocs(window.FB.collection(window.FB.db, `/artifacts/${window.FB.appId}/public/data/inquiries`));
                
                let text = "[활동로그]\n사번,활동,대상,일시\n";
                logSnap.docs.forEach(d => { const l = d.data(); text += `${l.empId},${l.action},"${l.target}",${l.dateString}\n`; });
                
                text += "\n[브로슈어 신청]\n사번,성함,거래처,코드,사무소,품목,수량,상태,일시\n";
                reqSnap.docs.forEach(d => { const r = d.data(); text += `${r.empId},${r.requesterName},${r.accountName},${r.accountCode},${r.office},"${r.brochureName}",${r.quantity},${r.completed ? "완료":"대기"},${r.dateString}\n`; });
                
                text += "\n[문의 및 건의]\n사번,사업부,팀,이름,내용,상태,일시\n";
                inqSnap.docs.forEach(d => { const i = d.data(); text += `${i.empId},${i.division},${i.team},${i.name},"${i.content.replace(/\n/g, " ")}",${i.completed ? "처리완료":"대기"},${i.dateString}\n`; });
                
                return text;
            };

            const downloadExcel = async () => {
                try {
                    const content = await getReportText();
                    const blob = new Blob(["\uFEFF" + content], { type: 'text/csv;charset=utf-8;' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `DM_HUB_REPORT_${new Date().toISOString().slice(0,10)}.csv`;
                    a.click();
                } catch(e) { alert("다운로드 오류. '데이터 전체 복사' 기능을 이용해 주세요."); }
            };

            const copyToClipboard = async () => {
                const content = await getReportText();
                const el = document.createElement('textarea');
                el.value = content;
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);
                alert("데이터가 복사되었습니다! 카톡이나 엑셀에 붙여넣기 하세요.");
            };

            const handleLogout = () => {
                sessionStorage.removeItem('mr_emp_id');
                setEmpId("");
                setLoginEmpId("");
                setLoginPassword("");
                setIsLoggedIn(false);
                setIsAdminMode(false);
            };

            // 관리자 MR 암호 변경
            const handleUpdateMrPassword = async () => {
                if(!window.FB || !newMrPassword) return;
                await window.FB.setDoc(window.FB.doc(window.FB.db, `/artifacts/${window.FB.appId}/public/data/settings`, 'config'), { mrPassword: newMrPassword }, { merge: true });
                alert("MR 접속 암호가 변경되었습니다.");
            };

            // 카테고리 순서 위/아래 변경 (공용)
            const moveCategory = async (list, dbPath, index, direction) => {
                if (!window.FB) return;
                const newIndex = index + direction;
                if (newIndex < 0 || newIndex >= list.length) return;

                const newList = [...list];
                const temp = newList[index];
                newList[index] = newList[newIndex];
                newList[newIndex] = temp;
                
                if (dbPath.includes('video')) setVideoCategoriesList(newList);
                else setCategoriesList(newList);

                const { db, appId, doc, updateDoc } = window.FB;
                try {
                    await Promise.all(newList.map((item, i) => 
                        updateDoc(doc(db, `/artifacts/${appId}/public/data/${dbPath}`, item.id), { order: i })
                    ));
                } catch(e) { console.error("순서 업데이트 실패:", e); }
            };

            // 카테고리명 수정 저장 (관련 자료들의 카테고리명도 함께 업데이트)
            const handleUpdateCategory = async (dbPath, item, newName) => {
                if (!window.FB || !newName.trim()) return;
                const finalName = newName.trim();
                if (item.name === finalName) {
                    setEditingCategoryId(null);
                    return;
                }
                
                const { db, appId, doc, updateDoc } = window.FB;
                try {
                    // 카테고리명 업데이트
                    await updateDoc(doc(db, `/artifacts/${appId}/public/data/${dbPath}`, item.id), { name: finalName });

                    // 기존 해당 카테고리로 등록된 자료들도 일괄 업데이트
                    const msgsToUpdate = messages.filter(m => m.category === item.name);
                    if (msgsToUpdate.length > 0) {
                        const updatePromises = msgsToUpdate.map(m => 
                            updateDoc(doc(db, `/artifacts/${appId}/public/data/messages`, m.id), { category: finalName })
                        );
                        await Promise.all(updatePromises);
                    }
                    alert("카테고리명이 성공적으로 수정되었습니다.");
                } catch (error) {
                    console.error(error);
                    alert("카테고리 수정 중 오류가 발생했습니다.");
                }
                setEditingCategoryId(null);
            };

            const handleImageUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 500;
                        let width = img.width;
                        let height = img.height;
                        if (width > MAX_WIDTH) { height = Math.round((height * MAX_WIDTH) / width); width = MAX_WIDTH; }
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        setFormState(prev => ({...prev, thumbnail: canvas.toDataURL('image/jpeg', 0.8)}));
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            };

            const handleSaveContent = async (e) => {
                e.preventDefault();
                if (!window.FB) return;
                const { db, appId, collection, addDoc, updateDoc, doc } = window.FB;
                
                let finalCategory = formState.category;
                if (!finalCategory) {
                    if (activeTab === 'materials') finalCategory = categoriesList.length > 0 ? categoriesList[0].name : "기타";
                    else if (activeTab === 'videos') finalCategory = videoCategoriesList.length > 0 ? videoCategoriesList[0].name : "기타";
                }
                
                const data = { ...formState, category: finalCategory, isVideo: activeTab === 'videos', timestamp: Date.now() };
                
                if (editingId) {
                    await updateDoc(doc(db, `/artifacts/${appId}/public/data/messages`, editingId), data);
                    alert("수정되었습니다.");
                } else {
                    await addDoc(collection(db, `/artifacts/${appId}/public/data/messages`), data);
                    alert("등록되었습니다.");
                }

                                            )}

                                            <div className="flex gap-2 pt-2">
                                                <button type="submit" className="flex-1 bg-blue-600 text-white font-black py-4 rounded-2xl text-sm shadow-lg flex items-center justify-center gap-2"><Icon name="save" size={18}/> {editingId ? "수정 저장" : "새로 등록"}</button>
                                                {editingId && <button type="button" onClick={() => {setEditingId(null); setFormState({title: "", category: "", description: "", pdfUrl: "", pptUrl: "", youtubeUrl: "", thumbnail: ""});}} className="px-8 bg-slate-100 text-slate-500 font-black rounded-2xl text-sm">취소</button>}
                                            </div>
                                        </form>

                                        <div className="mt-8 border-t pt-4">
                                            <div className="font-black text-xs text-slate-400 mb-4 text-center">등록된 항목 관리</div>
                                            <div className="divide-y max-h-[300px] overflow-y-auto no-scrollbar">
                                                {(activeTab === 'videos' ? messages.filter(m => m.isVideo) : messages.filter(m => !m.isVideo && m.category !== '제품 브로슈어')).map(item => (
                                                    <div key={item.id} className="py-3 flex justify-between items-center text-left gap-3">
                                                        {item.thumbnail && <img src={item.thumbnail} className="w-10 h-10 object-cover rounded-lg shadow-sm" alt="thumb"/>}
                                                        <div className="flex-1 pr-2">
                                                            <span className="text-[9px] font-black text-blue-400 uppercase">{item.category}</span>
                                                            <p className="font-black text-slate-800 text-xs line-clamp-1">{item.title}</p>
                                                        </div>
                                                        <div className="flex gap-1">
                                                            <button onClick={() => { setEditingId(item.id); setFormState({title: item.title||"", category: item.category||"", description: item.description||"", pdfUrl: item.pdfUrl||"", pptUrl: item.pptUrl||"", youtubeUrl: item.youtubeUrl||"", thumbnail: item.thumbnail||""}); window.scrollTo(0,0); }} className="p-2 text-slate-400 hover:text-blue-600"><Icon name="edit" size={16}/></button>
                                                            <button onClick={() => { if(window.confirm("삭제하시겠습니까?")) window.FB.deleteDoc(window.FB.doc(window.FB.db, `/artifacts/${window.FB.appId}/public/data/messages`, item.id)); }} className="p-2 text-slate-400 hover:text-red-500"><Icon name="trash" size={16}/></button>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                )}

                                {/* 브로슈어 신청 내역 탭 */}
                                {activeTab === 'requests' && (
                                    <div className="bg-white rounded-[2rem] border overflow-hidden shadow-sm animate-in fade-in">
                                        <div className="p-4 bg-slate-50 border-b font-black text-xs text-slate-400">신청 내역</div>
                                        <div className="divide-y max-h-[600px] overflow-y-auto no-scrollbar">
                                            {requests.map(req => (
                                                <div key={req.id} className={`p-5 flex items-center gap-4 transition-all ${req.completed ? 'opacity-40' : ''}`}>
                                                    <button onClick={() => window.FB.updateDoc(window.FB.doc(window.FB.db, `/artifacts/${window.FB.appId}/public/data/requests`, req.id), { completed: !req.completed })}>
                                                        {req.completed ? <Icon name="checkCircle" size={24} className="text-green-500"/> : <Icon name="circle" size={24} className="text-slate-200"/>}
                                                    </button>
                                                    <div className={`text-left flex-1 ${req.completed ? 'line-through decoration-slate-900 decoration-2' : ''}`}>
                                                        <p className="font-black text-sm text-blue-600">{req.brochureName} ({req.quantity}부)</p>
                                                        <p className="text-[10px] font-bold text-slate-800">{req.accountName}</p>
                                                        <p className="text-[9px] text-slate-400 font-medium">{req.office} | {req.requesterName}</p>
                                                    </div>
                                                    <button onClick={() => window.confirm("삭제할까요?") && window.FB.deleteDoc(window.FB.doc(window.FB.db, `/artifacts/${window.FB.appId}/public/data/requests`, req.id))} className="text-slate-200 hover:text-red-500"><Icon name="trash" size={18}/></button>
                                                </div>
                                            ))}
                                            {requests.length === 0 && <p className="p-10 text-center text-slate-300 font-bold italic">신청 내역이 없습니다.</p>}
                                        </div>
                                    </div>
                                )}

                                {/* 문의 내역 탭 */}
                                {activeTab === 'inquiries' && (
                                    <div className="bg-white rounded-[2rem] border overflow-hidden shadow-sm animate-in fade-in">
                                        <div className="p-4 bg-slate-50 border-b font-black text-xs text-slate-400">건의 및 문의 내역</div>
                                        <div className="divide-y max-h-[600px] overflow-y-auto no-scrollbar">
                                            {inquiries.map(inq => (
                                                <div key={inq.id} className={`p-5 flex items-start gap-4 transition-all ${inq.completed ? 'opacity-40' : ''}`}>
                                                    <button onClick={() => window.FB.updateDoc(window.FB.doc(window.FB.db, `/artifacts/${window.FB.appId}/public/data/inquiries`, inq.id), { completed: !inq.completed })} className="mt-1">
                                                        {inq.completed ? <Icon name="checkCircle" size={24} className="text-green-500"/> : <Icon name="circle" size={24} className="text-slate-200"/>}
                                                    </button>
                                                    <div className={`text-left flex-1 ${inq.completed ? 'line-through decoration-slate-900 decoration-2' : ''}`}>
                                                        <p className="font-bold text-xs text-slate-800 mb-1">[{inq.division}] {inq.team} - {inq.name}({inq.empId})</p>
                                                        <p className="text-sm text-blue-600 font-black whitespace-pre-wrap">{inq.content}</p>
                                                        <p className="text-[9px] text-slate-400 font-medium mt-2">{inq.dateString}</p>
                                                    </div>
                                                    <button onClick={() => window.confirm("삭제할까요?") && window.FB.deleteDoc(window.FB.doc(window.FB.db, `/artifacts/${window.FB.appId}/public/data/inquiries`, inq.id))} className="text-slate-200 hover:text-red-500"><Icon name="trash" size={18}/></button>
                                                </div>
                                            ))}
                                            {inquiries.length === 0 && <p className="p-10 text-center text-slate-300 font-bold italic">문의 내역이 없습니다.</p>}
                                        </div>
                                    </div>
                                )}

                                {/* 실시간 로그 탭 */}
                                {activeTab === 'logs' && (
                                    <div className="bg-white rounded-[2rem] border overflow-hidden shadow-sm animate-in fade-in">
                                        <div className="p-4 bg-slate-50 border-b flex justify-between items-center">
                                            <span className="font-black text-xs text-slate-400 uppercase tracking-widest">최근 접속/활동 로그</span>
                                            <button onClick={fetchRecentLogs} className="bg-blue-100 text-blue-600 px-3 py-1.5 rounded-xl flex items-center gap-1 text-[10px] font-black active:scale-95 transition-transform"><Icon name="refresh" size={14}/> 새로고침</button>
                                        </div>
                                        <div className="divide-y max-h-[600px] overflow-y-auto no-scrollbar bg-slate-900 text-green-400 font-mono text-xs p-4 space-y-2">
                                            {recentLogs.length === 0 ? <p className="text-slate-500 italic text-center py-10">로그 데이터가 없습니다.</p> : recentLogs.map(log => (
                                                <div key={log.id} className="pb-2 border-b border-slate-800">
                                                    <span className="text-slate-500 text-[10px]">[{log.dateString}]</span> <br/>
                                                    <span className="text-blue-400 font-bold">MR_{log.empId}</span> | {log.action} : {log.target}
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}
                            </div>
                        ) : activeTab === "requests" ? (
                            /* 사용자 - 브로슈어 신청 */
                            <div className="bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-100 text-center animate-in fade-in slide-in-from-bottom-4">
                                <div className="text-center mb-8">
                                    <div className="w-16 h-16 bg-blue-50 text-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-inner rotate-3 text-center"><Icon name="cart" size={32}/></div>
                                    <h2 className="text-2xl font-black text-slate-800 tracking-tight text-center">브로슈어 신청</h2>
                                </div>
                                <form onSubmit={async (e) => {
                                    e.preventDefault();
                                    await window.FB.addDoc(window.FB.collection(window.FB.db, `/artifacts/${window.FB.appId}/public/data/requests`), { ...requestForm, empId, completed: false, timestamp: Date.now(), dateString: new Date().toLocaleString('ko-KR') });
                                    logAction("신청", requestForm.brochureName);
                                    alert("성공적으로 신청되었습니다.");
                                    setRequestForm({ brochureName: "", requesterName: "", phone: "", office: "", quantity: "", accountName: "", accountCode: "" });
                                }} className="space-y-4 text-center">
                                    <select className="w-full p-4 bg-slate-50 border-2 border-slate-50 rounded-2xl font-bold appearance-none text-center outline-none focus:border-blue-500" value={requestForm.brochureName} onChange={e => setRequestForm({...requestForm, brochureName: e.target.value})} required>
                                        <option value="" disabled hidden>-- 필요한 브로슈어를 선택하세요 --</option>
                                        {messages.filter(m => m.category === "제품 브로슈어").map(m => <option key={m.id} value={m.title}>{m.title}</option>)}
                                    </select>
                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 text-center">
                                        <div className="relative text-center">
                                            <Icon name="building" size={16} className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-300 text-center"/>
                                            <input className="w-full pl-11 pr-4 py-4 bg-slate-50 border-2 border-slate-50 rounded-2xl font-bold text-sm outline-none focus:border-blue-500 text-center sm:text-left" placeholder="거래처명" value={requestForm.accountName} onChange={e => setRequestForm({...requestForm, accountName: e.target.value})} required />
                                        </div>
                                        <div className="relative text-center">
                                            <Icon name="finger" size={16} className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-300 text-center"/>
                                            <input className="w-full pl-11 pr-4 py-4 bg-slate-50 border-2 border-slate-50 rounded-2xl font-bold text-sm outline-none focus:border-blue-500 text-center sm:text-left" placeholder="거래처코드" value={requestForm.accountCode} onChange={e => setRequestForm({...requestForm, accountCode: e.target.value})} required />
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-3 text-center">
                                        <input className="p-4 bg-slate-50 border-2 border-slate-50 rounded-2xl font-bold text-center text-sm outline-none focus:border-blue-500" placeholder="신청자명" value={requestForm.requesterName} onChange={e => setRequestForm({...requestForm, requesterName: e.target.value})} required />
                                        <input type="number" inputMode="numeric" className="p-4 bg-slate-50 border-2 border-slate-50 rounded-2xl font-bold text-center text-sm outline-none focus:border-blue-500" placeholder="수량" value={requestForm.quantity} onChange={e => setRequestForm({...requestForm, quantity: e.target.value})} required />
                                    </div>
                                    <input className="w-full p-4 bg-slate-50 border-2 border-slate-50 rounded-2xl font-bold text-center text-sm outline-none focus:border-blue-500" placeholder="연락처 (010-0000-0000)" value={requestForm.phone} onChange={e => setRequestForm({...requestForm, phone: e.target.value})} required />
                                    <input className="w-full p-4 bg-slate-50 border-2 border-slate-50 rounded-2xl font-bold text-center text-sm outline-none focus:border-blue-500" placeholder="사무소명 (예: 강남사무소)" value={requestForm.office} onChange={e => setRequestForm({...requestForm, office: e.target.value})} required />
                                    <button className="w-full bg-blue-600 text-white py-5 rounded-2xl font-black shadow-xl shadow-blue-100 active:scale-95 transition-all text-center flex items-center justify-center gap-2"><Icon name="save" size={18}/> 신청 등록하기</button>
                                </form>
                            </div>
                        ) : activeTab === "inquiries" ? (
                            /* 사용자 - 문의 및 건의 */
                            <div className="bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-100 text-center animate-in fade-in slide-in-from-bottom-4">
                                <div className="text-center mb-8">
                                    <div className="w-16 h-16 bg-blue-50 text-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-inner text-center"><Icon name="messageSquare" size={32}/></div>
                                    <h2 className="text-2xl font-black text-slate-800 tracking-tight text-center">문의 및 건의사항</h2>
                                    <p className="text-xs text-slate-400 mt-1 font-medium">자유롭게 의견을 남겨주시면 PM이 확인 후 답변드립니다.</p>
                                </div>
                                <form onSubmit={submitInquiry} className="space-y-4">
                                    <div className="grid grid-cols-2 gap-3">
                                        <input className="p-4 bg-slate-50 border-2 border-slate-50 rounded-2xl font-bold text-center text-sm outline-none focus:border-blue-500" placeholder="사업부명" value={inquiryForm.division} onChange={e => setInquiryForm({...inquiryForm, division: e.target.value})} required />
                                        <input className="p-4 bg-slate-50 border-2 border-slate-50 rounded-2xl font-bold text-center text-sm outline-none focus:border-blue-500" placeholder="팀명" value={inquiryForm.team} onChange={e => setInquiryForm({...inquiryForm, team: e.target.value})} required />
                                    </div>
                                    <input className="w-full p-4 bg-slate-50 border-2 border-slate-50 rounded-2xl font-bold text-center text-sm outline-none focus:border-blue-500" placeholder="담당자명" value={inquiryForm.name} onChange={e => setInquiryForm({...inquiryForm, name: e.target.value})} required />
                                    <textarea className="w-full p-4 bg-slate-50 border-2 border-slate-50 rounded-2xl font-bold text-sm h-32 outline-none focus:border-blue-500 text-left resize-none" placeholder="문의나 건의하실 내용을 상세히 적어주세요." value={inquiryForm.content} onChange={e => setInquiryForm({...inquiryForm, content: e.target.value})} required />
                                    <button className="w-full bg-slate-800 text-white py-5 rounded-2xl font-black shadow-xl active:scale-95 transition-all text-center flex items-center justify-center gap-2">의견 접수하기</button>
                                </form>
                            </div>
                        ) : (
                            /* 사용자 - 자료실 / 교육영상 */
                            <div className="space-y-4 text-center animate-in fade-in slide-in-from-bottom-4">
                                <div className="relative group text-center">
                                    <Icon name="search" size={20} className="absolute left-5 top-1/2 -translate-y-1/2 text-slate-300 transition-colors group-focus-within:text-blue-500 text-center" />
                                    <input className="w-full pl-14 pr-6 py-5 bg-white rounded-[2rem] border-none shadow-sm outline-none text-sm font-black focus:ring-4 focus:ring-blue-50 transition-all text-center" placeholder="키워드 검색..." value={searchQuery} onChange={e => setSearchQuery(e.target.value)} />
                                </div>
                                
                                <div className="w-full overflow-x-auto no-scrollbar py-2">
                                    <div className="flex gap-2 w-max px-1">
                                        {['전체', ...(activeTab === "materials" ? categoriesList : videoCategoriesList).map(c => c.name)].map(cat => (
                                            <button key={cat} onClick={() => setSelectedCategory(cat)} className={`flex-shrink-0 whitespace-nowrap px-5 py-2.5 rounded-full text-[11px] font-black transition-all text-center ${selectedCategory === cat ? "bg-slate-800 text-white shadow-lg scale-105" : "bg-white text-slate-500 border border-slate-100 hover:bg-slate-50"}`}>
                                                {cat}
                                            </button>
                                        ))}
                                    </div>
                                </div>

                                <div className="grid grid-cols-1 gap-4 text-center mt-2">
                                    {filteredDisplay.map(item => (
                                        <div key={item.id} className="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-50 text-center active:scale-[0.98] transition-all group overflow-hidden">
                                            {item.thumbnail && (
                                                <div className="mb-4 -mx-6 -mt-6">
                                                    <img src={item.thumbnail} alt={item.title} className="w-full h-40 sm:h-48 object-cover" />
                                                </div>
                                            )}
                                            
                                            <span className="text-[9px] font-black px-2 py-1 bg-blue-50 text-blue-600 rounded-md uppercase mb-2 inline-block tracking-wider text-center">{item.category}</span>
                                            <h3 className="text-lg font-black text-slate-800 mb-2 leading-tight group-hover:text-blue-600 transition-colors text-center">{item.title}</h3>
                                            {item.description && <p className="text-[12px] text-slate-400 font-medium mb-5 line-clamp-2 leading-relaxed text-center">{item.description}</p>}
                                            
                                            <div className="flex gap-2 text-center mt-4">
                                                {item.pdfUrl && <a href={item.pdfUrl} target="_blank" onClick={() => logAction("PDF 열람", item.title)} className="flex-1 bg-red-50 text-red-600 py-4 rounded-2xl text-[10px] font-black border border-red-100 text-center flex items-center justify-center gap-1 hover:bg-red-100 transition-colors"><Icon name="download" size={14}/> PDF</a>}
                                                {item.pptUrl && <a href={item.pptUrl} target="_blank" onClick={() => logAction("PPT 열람", item.title)} className="flex-1 bg-orange-50 text-orange-600 py-4 rounded-2xl text-[10px] font-black border border-orange-100 text-center flex items-center justify-center gap-1 hover:bg-orange-100 transition-colors"><Icon name="download" size={14}/> PPT</a>}
                                                {item.youtubeUrl && <a href={item.youtubeUrl} target="_blank" onClick={() => logAction("영상 시청", item.title)} className="w-full bg-red-600 text-white py-4 rounded-2xl text-xs font-black shadow-lg shadow-red-100 flex items-center justify-center gap-2 text-center hover:bg-red-700 transition-colors"><Icon name="youtube" size={16}/> 영상 시청</a>}
                                            </div>
                                        </div>
                                    ))}
                                    {filteredDisplay.length === 0 && <p className="py-20 text-center text-slate-300 font-bold italic text-sm">등록된 콘텐츠가 없습니다.</p>}
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Admin Auth Modal */}
                    {showAdminLogin && (
                        <div className="fixed inset-0 z-[60] flex items-center justify-center bg-slate-900/50 backdrop-blur-md p-4 text-center">
                            <div className="bg-white w-full max-w-sm rounded-[2.5rem] p-10 shadow-2xl animate-in zoom-in text-center">
                                <h2 className="font-black text-lg mb-8 flex items-center justify-center gap-2 uppercase tracking-widest text-center"><Icon name="lock" size={20} className="text-blue-600"/> PM AUTH</h2>
                                <form onSubmit={(e) => {
                                    e.preventDefault();
                                    if (passwordInput === ADMIN_PASSWORD) { setIsAdminMode(true); setShowAdminLogin(false); setPasswordInput(""); setActiveTab("requests"); }
                                    else alert("비밀번호 불일치");
                                }} className="space-y-4 text-center">
                                    <input type="password" autoFocus className="w-full p-5 bg-slate-50 border-2 border-slate-100 rounded-2xl text-center text-2xl font-black outline-none focus:border-blue-500 text-center" placeholder="••••" value={passwordInput} onChange={e => setPasswordInput(e.target.value)} />
                                    <button className="w-full bg-slate-900 text-white py-5 rounded-2xl font-black shadow-xl text-center">인증 확인</button>
                                </form>
                                <button onClick={() => setShowAdminLogin(false)} className="w-full mt-4 text-[10px] text-slate-400 font-bold uppercase tracking-[0.2em] text-center">닫기</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
