<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DM TEAM MR HUB</title>
    <!-- 외부 라이브러리 (CDN) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Firebase SDK (v10) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, doc, onSnapshot, updateDoc, getDocs, deleteDoc, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB475AzDr96EP6I7YsyZx3OjnYDMuMaq7k",
            authDomain: "diabetes-sales.firebaseapp.com",
            projectId: "diabetes-sales",
            storageBucket: "diabetes-sales.firebasestorage.app",
            messagingSenderId: "778615949732",
            appId: "1:778615949732:web:8783bfcb0a95ec15cbd931"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = "dm-team-mr-hub-v3"; 

        window.FB = { 
            db, auth, appId, 
            collection, addDoc, doc, onSnapshot, updateDoc, getDocs, deleteDoc, query, orderBy, limit,
            signInAnonymously, onAuthStateChanged 
        };
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        input, select, textarea { font-size: 16px !important; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback } = React;

        // --- SVG 아이콘 컴포넌트 ---
        const Icon = ({ name, size = 20, className = "" }) => {
            const icons = {
                search: <g><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></g>,
                file: <g><path d="M13 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V9z" /><polyline points="13 2 13 9 20 9" /></g>,
                download: <g><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4" /><polyline points="7 10 12 15 17 10" /><line x1="12" y1="15" x2="12" y2="3" /></g>,
                trash: <g><polyline points="3 6 5 6 21 6" /><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2" /></g>,
                lock: <g><rect x="3" y="11" width="18" height="11" rx="2" ry="2" /><path d="M7 11V7a5 5 0 0110 0v4" /></g>,
                logout: <g><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4" /><polyline points="16 17 21 12 16 7" /><line x1="21" y1="12" x2="9" y2="12" /></g>,
                youtube: <g><path d="M22.54 6.42a2.78 2.78 0 00-1.94-2C18.88 4 12 4 12 4s-6.88 0-8.6.46a2.78 2.78 0 00-1.94 2A29 29 0 001 11.75a29 29 0 00.46 5.33A2.78 2.78 0 003.4 19.1c1.72.46 8.6.46 8.6.46s6.88 0 8.6-.46a2.78 2.78 0 001.94-2 29 29 0 00.46-5.33 29 29 0 00-.46-5.33z" /><polygon points="9.75 15.02 15.5 11.75 9.75 8.48 9.75 15.02" /></g>,
                user: <g><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2" /><circle cx="12" cy="7" r="4" /></g>,
                excel: <g><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z" /><polyline points="14 2 14 8 20 8" /><path d="M8 13h2v7H8zM12 15h2v5h-2zM16 11h2v9h-2z" /></g>,
                cart: <g><circle cx="9" cy="21" r="1" /><circle cx="20" cy="21" r="1" /><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6" /></g>,
                checkCircle: <g><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></g>,
                circle: <g><circle cx="12" cy="12" r="10" /></g>,
                building: <g><rect x="4" y="2" width="16" height="20" rx="2" ry="2" /><line x1="9" y1="22" x2="9" y2="2" /><line x1="15" y1="22" x2="15" y2="2" /><line x1="4" y1="6" x2="20" y2="6" /><line x1="4" y1="10" x2="20" y2="10" /><line x1="4" y1="14" x2="20" y2="14" /><line x1="4" y1="18" x2="20" y2="18" /></g>,
                finger: <g><path d="M2 12a10 10 0 0110-10" /><path d="M7 15a10 10 0 0110-10" /><path d="M12 18a10 10 0 0110-10" /><circle cx="12" cy="12" r="3" /></g>,
                copy: <g><rect x="9" y="9" width="13" height="13" rx="2" ry="2" /><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1" /></g>,
                database: <g><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></g>,
                edit: <g><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></g>,
                save: <g><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></g>,
                refresh: <g><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/></g>,
                plus: <g><line x1="12" y1="5" x2="12" y2="19" /><line x1="5" y1="12" x2="19" y2="12" /></g>
            };
            return (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name]}
                </svg>
            );
        };

        const ADMIN_PASSWORD = "1024"; // 관리자 비밀번호
        const CATEGORIES = ["전체", "임상 데이터", "제품 브로슈어", "경쟁품 비교", "보험 가이드라인", "FAQ/Q&A", "교육 영상"];

        const App = () => {
            const [user, setUser] = useState(null);
            const [empId, setEmpId] = useState(localStorage.getItem('mr_emp_id') || "");
            const [isLoggedIn, setIsLoggedIn] = useState(!!localStorage.getItem('mr_emp_id'));
            const [activeTab, setActiveTab] = useState("materials");
            const [messages, setMessages] = useState([]);
            const [requests, setRequests] = useState([]);
            const [recentLogs, setRecentLogs] = useState([]);
            const [searchQuery, setSearchQuery] = useState("");
            const [selectedCategory, setSelectedCategory] = useState("전체");
            const [isAdminMode, setIsAdminMode] = useState(false);
            const [showAdminLogin, setShowAdminLogin] = useState(false);
            const [passwordInput, setPasswordInput] = useState("");
            const [editingId, setEditingId] = useState(null);
            
            // 등록용 상태
            const [formState, setFormState] = useState({ title: "", category: "임상 데이터", description: "", pdfUrl: "", pptUrl: "", youtubeUrl: "" });
            const [requestForm, setRequestForm] = useState({ brochureName: "", requesterName: "", phone: "", office: "", quantity: "", accountName: "", accountCode: "" });
            const [newBrochureName, setNewBrochureName] = useState(""); // 품목 관리용 상태

            useEffect(() => {
                const init = setInterval(() => {
                    if (window.FB) {
                        clearInterval(init);
                        const { auth, signInAnonymously, onAuthStateChanged } = window.FB;
                        signInAnonymously(auth).then(() => {
                            onAuthStateChanged(auth, setUser);
                        }).catch(err => console.error("Login Error:", err));
                    }
                }, 500);
            }, []);

            useEffect(() => {
                if (!user || !window.FB) return;
                const { db, appId, collection, onSnapshot } = window.FB;
                const base = `/artifacts/${appId}/public/data/`;

                const unsubMsg = onSnapshot(collection(db, `${base}messages`), (snap) => {
                    let data = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    setMessages(data.sort((a,b) => b.timestamp - a.timestamp));
                });

                const unsubReq = onSnapshot(collection(db, `${base}requests`), (snap) => {
                    setRequests(snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => b.timestamp - a.timestamp));
                });
                
                fetchRecentLogs();
                return () => { unsubMsg(); unsubReq(); };
            }, [user, isAdminMode]);

            const fetchRecentLogs = useCallback(async () => {
                if (!user || !window.FB || !isAdminMode) return;
                const { db, appId, collection, getDocs, query, orderBy, limit } = window.FB;
                const logsRef = collection(db, `/artifacts/${appId}/public/data/logs`);
                const q = query(logsRef, orderBy("timestamp", "desc"), limit(50));
                const snap = await getDocs(q);
                setRecentLogs(snap.docs.map(d => ({id: d.id, ...d.data()})));
            }, [user, isAdminMode]);

            const logAction = async (action, target) => {
                if (!empId || !window.FB) return;
                await window.FB.addDoc(window.FB.collection(window.FB.db, `/artifacts/${window.FB.appId}/public/data/logs`), {
                    empId, action, target, timestamp: Date.now(), dateString: new Date().toLocaleString('ko-KR')
                });
            };

            const getReportText = async () => {
                const logSnap = await window.FB.getDocs(window.FB.collection(window.FB.db, `/artifacts/${window.FB.appId}/public/data/logs`));
                const reqSnap = await window.FB.getDocs(window.FB.collection(window.FB.db, `/artifacts/${window.FB.appId}/public/data/requests`));
                
                let text = "[활동로그]\n사번,활동,대상,일시\n";
                logSnap.docs.forEach(d => { const l = d.data(); text += `${l.empId},${l.action},"${l.target}",${l.dateString}\n`; });
                text += "\n[브로슈어 신청]\n사번,성함,거래처,코드,사무소,품목,수량,상태,일시\n";
                reqSnap.docs.forEach(d => { const r = d.data(); text += `${r.empId},${r.requesterName},${r.accountName},${r.accountCode},${r.office},"${r.brochureName}",${r.quantity},${r.completed ? "완료":"대기"},${r.dateString}\n`; });
                return text;
            };

            const downloadExcel = async () => {
                try {
                    const content = await getReportText();
                    const blob = new Blob(["\uFEFF" + content], { type: 'text/csv;charset=utf-8;' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `DM_HUB_REPORT_${new Date().toISOString().slice(0,10)}.csv`;
                    a.click();
                } catch(e) { alert("다운로드 오류. '데이터 전체 복사' 기능을 이용해 주세요."); }
            };

            const copyToClipboard = async () => {
                const content = await getReportText();
                const el = document.createElement('textarea');
                el.value = content;
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);
                alert("데이터가 복사되었습니다! 카톡이나 엑셀에 붙여넣기 하세요.");
            };

            const handleLogout = () => {
                localStorage.removeItem('mr_emp_id');
                setEmpId("");
                setIsLoggedIn(false);
                setIsAdminMode(false);
            };

            const handleSaveContent = async (e) => {
                e.preventDefault();
                if (!window.FB) return;
                const { db, appId, collection, addDoc, updateDoc, doc } = window.FB;
                const data = { ...formState, timestamp: Date.now() };
                
                if (editingId) {
                    await updateDoc(doc(db, `/artifacts/${appId}/public/data/messages`, editingId), data);
                    alert("수정되었습니다.");
                } else {
                    await addDoc(collection(db, `/artifacts/${appId}/public/data/messages`), data);
                    alert("등록되었습니다.");
                }
                setEditingId(null);
                setFormState({ title: "", category: activeTab === "videos" ? "교육 영상" : "임상 데이터", description: "", pdfUrl: "", pptUrl: "", youtubeUrl: "" });
            };

            const filteredDisplay = useMemo(() => {
                const list = activeTab === "videos" ? messages.filter(m => m.category === "교육 영상") : messages.filter(m => m.category !== "교육 영상");
                const catMatch = selectedCategory === "전체" ? list : list.filter(m => m.category === selectedCategory);
                return catMatch.filter(m => m.title.toLowerCase().includes(searchQuery.toLowerCase()));
            }, [messages, activeTab, searchQuery, selectedCategory]);

            if (!isLoggedIn) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-[#0f172a] p-6 text-center">
                        <div className="bg-white w-full max-w-sm rounded-[2.5rem] p-10 shadow-2xl">
                            <div className="w-20 h-20 bg-blue-50 text-blue-600 rounded-3xl flex items-center justify-center mx-auto mb-6 rotate-3 shadow-inner"><Icon name="user" size={40} /></div>
                            <h1 className="text-2xl font-black text-slate-800 tracking-tight">DM TEAM MR HUB</h1>
                            <p className="text-slate-400 text-xs mt-2 mb-8 font-bold uppercase tracking-widest text-center">Authorized Access Only</p>
                            <form onSubmit={(e) => { e.preventDefault(); if(/^\d{6}$/.test(empId)) { localStorage.setItem('mr_emp_id', empId); setIsLoggedIn(true); logAction("LOGIN", "시스템 접속"); } else alert("사번 6자리를 숫자로 입력하세요."); }} className="space-y-6 text-center">
                                <input type="text" inputMode="numeric" pattern="\d*" maxLength={6} className="w-full p-5 bg-slate-50 border-2 border-slate-100 rounded-2xl text-center text-3xl font-black tracking-[0.4em] outline-none focus:border-blue-500 focus:bg-white transition-all shadow-sm" placeholder="000000" value={empId} onChange={e => setEmpId(e.target.value)} required />
                                <button className="w-full bg-blue-600 text-white py-5 rounded-2xl font-black text-lg hover:bg-blue-700 active:scale-95 transition-all shadow-xl shadow-blue-100 text-center">입장하기</button>
                            </form>
                        </div>
                    </div>
                );
            }

            return (
                <div className="max-w-xl mx-auto min-h-screen pb-24 relative">
                    <header className="bg-white/90 backdrop-blur-md border-b sticky top-0 z-50 px-6 py-4 flex justify-between items-center shadow-sm">
                        <div className="flex items-center gap-2 text-slate-800 uppercase font-black tracking-tighter">
                            <div className="bg-blue-600 p-2 rounded-xl text-white shadow-lg"><Icon name="file" size={18}/></div>
                            <span>DM TEAM HUB</span>
                        </div>
                        <div className="flex items-center gap-2">
                            <button onClick={handleLogout} className="px-3 py-2 rounded-xl text-[10px] font-black text-slate-500 bg-slate-100 hover:bg-slate-200 transition-colors flex items-center gap-1 active:scale-95">
                                <Icon name="logout" size={14} /> 나가기
                            </button>
                            <button onClick={() => isAdminMode ? setIsAdminMode(false) : setShowAdminLogin(true)} className={`p-2 rounded-xl transition-all flex items-center justify-center active:scale-95 ${isAdminMode ? 'bg-red-50 text-red-600' : 'bg-white border text-slate-300'}`}>
                                {isAdminMode ? <span className="text-[10px] font-black px-1">PM 종료</span> : <Icon name="lock" size={16} />}
                            </button>
                        </div>
                    </header>

                    {!isAdminMode && (
                        <nav className="flex bg-white border-b sticky top-[69px] z-40 p-1 shadow-sm">
                            <button onClick={() => { setActiveTab("requests"); setSelectedCategory("전체"); }} className={`flex-1 py-3 text-xs font-black rounded-xl transition-all ${activeTab === "requests" ? "bg-blue-50 text-blue-600 shadow-inner" : "text-slate-400"}`}>브로셔 신청</button>
                            <button onClick={() => { setActiveTab("materials"); setSelectedCategory("전체"); }} className={`flex-1 py-3 text-xs font-black rounded-xl transition-all ${activeTab === "materials" ? "bg-blue-50 text-blue-600 shadow-inner" : "text-slate-400"}`}>자료실</button>
                            <button onClick={() => { setActiveTab("videos"); setSelectedCategory("전체"); }} className={`flex-1 py-3 text-xs font-black rounded-xl transition-all ${activeTab === "videos" ? "bg-blue-50 text-blue-600 shadow-inner" : "text-slate-400"}`}>교육영상</button>
                        </nav>
                    )}

                    <main className="p-4 sm:p-6">
                        {isAdminMode ? (
                            <div className="space-y-4 animate-in fade-in">
                                {/* PM Dashboard */}
                                <div className="bg-white p-6 rounded-3xl border border-blue-50 text-center shadow-sm">
                                    <h2 className="font-black text-lg mb-4 text-blue-600 uppercase tracking-widest"><Icon name="database" size={20} className="inline mr-2"/>PM Dashboard</h2>
                                    <div className="grid grid-cols-1 gap-2">
                                        <button onClick={downloadExcel} className="w-full bg-green-600 text-white py-4 rounded-2xl text-sm font-black shadow-md flex items-center justify-center gap-2"><Icon name="excel" size={18}/> 엑셀 다운로드</button>
                                        <button onClick={copyToClipboard} className="w-full bg-slate-800 text-white py-4 rounded-2xl text-sm font-black shadow-md flex items-center justify-center gap-2"><Icon name="copy" size={18}/> 데이터 전체 복사 (모바일용)</button>
                                    </div>
                                </div>

                                {/* Admin Tabs (가로 스크롤 또는 줄바꿈 대응) */}
                                <div className="flex flex-wrap bg-slate-200 p-1 rounded-2xl gap-1">
                                    {['requests', 'brochures', 'materials', 'videos', 'logs'].map(t => (
                                        <button key={t} onClick={() => { setActiveTab(t); setEditingId(null); if(t === 'logs') fetchRecentLogs(); }} className={`flex-1 min-w-[70px] py-3 px-1 text-[11px] font-black rounded-xl transition-all ${activeTab === t ? 'bg-white shadow-md text-blue-600' : 'text-slate-500'}`}>
                                            {t === 'requests' ? '신청 내역' : t === 'brochures' ? '품목 관리' : t === 'materials' ? '자료 등록' : t === 'videos' ? '영상 등록' : '실시간 로그'}
                                        </button>
                                    ))}
                                </div>

                                {/* 브로슈어 품목 관리 탭 */}
                                {activeTab === 'brochures' && (
                                    <div className="space-y-4 animate-in fade-in">
                                        <div className="bg-white p-6 rounded-[2rem] border border-slate-100 shadow-sm">
                                            <h3 className="font-black text-xs mb-4 text-slate-400 uppercase tracking-widest text-center">신청 폼에 나타날 품목 추가</h3>
                                            <form onSubmit={async (e) => {
                                                e.preventDefault();
                                                if(!window.FB) return;
                                                await window.FB.addDoc(window.FB.collection(window.FB.db, `/artifacts/${window.FB.appId}/public/data/messages`), {
                                                    title: newBrochureName, category: "제품 브로슈어", description: "브로슈어 신청 전용 품목입니다.", pdfUrl: "", pptUrl: "", youtubeUrl: "", timestamp: Date.now()
                                                });
                                                setNewBrochureName("");
                                                alert("품목이 추가되었습니다.");
                                            }} className="flex gap-2">
                                                <input className="flex-1 p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl text-sm font-bold outline-none focus:border-blue-500" placeholder="예: 24년형 메인 리플렛" value={newBrochureName} onChange={e => setNewBrochureName(e.target.value)} required />
                                                <button type="submit" className="bg-blue-600 text-white px-5 rounded-2xl font-black text-sm flex items-center justify-center shadow-md active:scale-95"><Icon name="plus" size={20}/></button>
                                            </form>
                                        </div>
                                        <div className="bg-white rounded-[2rem] border overflow-hidden shadow-sm">
                                            <div className="p-4 bg-slate-50 border-b font-black text-xs text-slate-400">등록된 신청 품목</div>
                                            <div className="divide-y max-h-[400px] overflow-y-auto no-scrollbar">
                                                {messages.filter(m => m.category === "제품 브로슈어").map(item => (
                                                    <div key={item.id} className="p-4 flex justify-between items-center text-left">
                                                        <span className="font-bold text-sm text-slate-800">{item.title}</span>
                                                        <button onClick={() => window.confirm("품목을 삭제하시겠습니까?") && window.FB.deleteDoc(window.FB.doc(window.FB.db, `/artifacts/${window.FB.appId}/public/data/messages`, item.id))} className="p-2 text-slate-300 hover:text-red-500"><Icon name="trash" size={18}/></button>
                                                    </div>
                                                ))}
                                                {messages.filter(m => m.category === "제품 브로슈어").length === 0 && <p className="p-10 text-center text-slate-300 font-bold italic">등록된 품목이 없습니다.</p>}
                                            </div>
                                        </div>
                                    </div>
                                )}

                                {/* Content Entry Form (자료 및 영상 등록 탭) */}
                                {(activeTab === 'materials' || activeTab === 'videos') && (
                                    <div className="bg-white p-6 rounded-[2rem] border border-slate-100 shadow-sm text-center sm:text-left">
                                        <h3 className="font-black text-xs mb-6 text-slate-400 uppercase tracking-widest text-center">{editingId ? "수정" : "새 콘텐츠 등록"}</h3>
                                        <form onSubmit={handleSaveContent} className="space-y-4 text-center">
                                            <input className="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl text-sm font-bold outline-none focus:border-blue-500" placeholder="제목" value={formState.title} onChange={e => setFormState({...formState, title: e.target.value})} required />
                                            <select className="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl text-sm font-bold text-center outline-none focus:border-blue-500" value={formState.category} onChange={e => setFormState({...formState, category: e.target.value})}>
                                                {activeTab === 'materials' ? CATEGORIES.filter(c=>c!=="전체" && c!=="교육 영상" && c!=="제품 브로슈어").map(c => <option key={c} value={c}>{c}</option>) : <option value="교육 영상">교육 영상</option>}
                                            </select>
                                            <textarea className="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl text-sm font-medium h-24 text-center outline-none focus:border-blue-500" placeholder="상세 설명 (선택)" value={formState.description} onChange={e => setFormState({...formState, description: e.target.value})} />
                                            
                                            {activeTab === "materials" ? (
                                                <div className="grid grid-cols-1 gap-2">
                                                    <input className="w-full p-3 bg-slate-50 border-2 border-slate-100 rounded-xl text-[10px] font-mono text-center outline-none focus:border-blue-500" placeholder="PDF 구글드라이브 링크" value={formState.pdfUrl} onChange={e => setFormState({...formState, pdfUrl: e.target.value})} />
                                                    <input className="w-full p-3 bg-slate-50 border-2 border-slate-100 rounded-xl text-[10px] font-mono text-center outline-none focus:border-blue-500" placeholder="PPT 구글드라이브 링크" value={formState.pptUrl} onChange={e => setFormState({...formState, pptUrl: e.target.value})} />
                                                </div>
                                            ) : (
                                                <input className="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl text-[10px] font-mono text-center outline-none focus:border-blue-500" placeholder="YouTube URL" value={formState.youtubeUrl} onChange={e => setFormState({...formState, youtubeUrl: e.target.value})} required />
                                            )}

                                            <div className="flex gap-2 pt-2">
                                                <button type="submit" className="flex-1 bg-blue-600 text-white font-black py-4 rounded-2xl text-sm shadow-lg flex items-center justify-center gap-2"><Icon name="save" size={18}/> {editingId ? "수정" : "등록"}</button>
                                                {editingId && <button type="button" onClick={() => {setEditingId(null); setFormState({title: "", category: "임상 데이터", description: "", pdfUrl: "", pptUrl: "", youtubeUrl: ""});}} className="px-8 bg-slate-100 text-slate-500 font-black rounded-2xl text-sm">취소</button>}
                                            </div>
                                        </form>

                                        {/* 리스트 출력 (해당 탭의 성격에 맞는 것만) */}
                                        <div className="mt-8 border-t pt-4">
                                            <div className="font-black text-xs text-slate-400 mb-4 text-center">등록된 항목 관리</div>
                                            <div className="divide-y max-h-[300px] overflow-y-auto no-scrollbar">
                                                {(activeTab === 'videos' ? messages.filter(m => m.category === '교육 영상') : messages.filter(m => m.category !== '교육 영상' && m.category !== '제품 브로슈어')).map(item => (
                                                    <div key={item.id} className="py-3 flex justify-between items-center text-left">
                                                        <div className="flex-1 pr-2">
                                                            <span className="text-[9px] font-black text-blue-400 uppercase">{item.category}</span>
                                                            <p className="font-black text-slate-800 text-xs">{item.title}</p>
                                                        </div>
                                                        <div className="flex gap-1">
                                                            <button onClick={() => { setEditingId(item.id); setFormState({...item}); window.scrollTo(0,0); }} className="p-2 text-slate-400 hover:text-blue-600"><Icon name="edit" size={16}/></button>
                                                            <button onClick={() => { if(window.confirm("삭제하시겠습니까?")) window.FB.deleteDoc(window.FB.doc(window.FB.db, `/artifacts/${window.FB.appId}/public/data/messages`, item.id)); }} className="p-2 text-slate-400 hover:text-red-500"><Icon name="trash" size={16}/></button>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                )}

                                {/* 브로슈어 신청 내역 탭 */}
                                {activeTab === 'requests' && (
                                    <div className="bg-white rounded-[2rem] border overflow-hidden shadow-sm animate-in fade-in">
                                        <div className="p-4 bg-slate-50 border-b font-black text-xs text-slate-400">신청 내역 리스트 (체크 시 취소선)</div>
                                        <div className="divide-y max-h-[600px] overflow-y-auto no-scrollbar">
                                            {requests.map(req => (
                                                <div key={req.id} className={`p-5 flex items-center gap-4 transition-all ${req.completed ? 'opacity-40' : ''}`}>
                                                    <button onClick={() => window.FB.updateDoc(window.FB.doc(window.FB.db, `/artifacts/${window.FB.appId}/public/data/requests`, req.id), { completed: !req.completed })}>
                                                        {req.completed ? <Icon name="checkCircle" size={24} className="text-green-500"/> : <Icon name="circle" size={24} className="text-slate-200"/>}
                                                    </button>
                                                    <div className={`text-left flex-1 ${req.completed ? 'line-through decoration-slate-900 decoration-2' : ''}`}>
                                                        <p className="font-black text-sm text-blue-600">{req.brochureName} ({req.quantity}부)</p>
                                                        <p className="text-[10px] font-bold text-slate-800">거래처: {req.accountName}</p>
                                                        <p className="text-[9px] text-slate-400 font-medium">{req.office} | {req.requesterName} (MR:{req.empId})</p>
                                                    </div>
                                                    <button onClick={() => window.confirm("삭제하시겠습니까?") && window.FB.deleteDoc(window.FB.doc(window.FB.db, `/artifacts/${window.FB.appId}/public/data/requests`, req.id))} className="text-slate-200 hover:text-red-500"><Icon name="trash" size={18}/></button>
                                                </div>
                                            ))}
                                            {requests.length === 0 && <p className="p-10 text-center text-slate-300 font-bold italic">신청 내역이 없습니다.</p>}
                                        </div>
                                    </div>
                                )}

                                {/* 실시간 로그 탭 */}
                                {activeTab === 'logs' && (
                                    <div className="bg-white rounded-[2rem] border overflow-hidden shadow-sm animate-in fade-in">
                                        <div className="p-4 bg-slate-50 border-b flex justify-between items-center">
                                            <span className="font-black text-xs text-slate-400 uppercase tracking-widest">최근 접속/활동 로그</span>
                                            <button onClick={fetchRecentLogs} className="bg-blue-100 text-blue-600 px-3 py-1.5 rounded-xl flex items-center gap-1 text-[10px] font-black active:scale-95 transition-transform"><Icon name="refresh" size={14}/> 새로고침</button>
                                        </div>
                                        <div className="divide-y max-h-[600px] overflow-y-auto no-scrollbar bg-slate-900 text-green-400 font-mono text-xs p-4 space-y-2">
                                            {recentLogs.length === 0 ? <p className="text-slate-500 italic text-center py-10">로그 데이터가 없습니다.</p> : recentLogs.map(log => (
                                                <div key={log.id} className="pb-2 border-b border-slate-800">
                                                    <span className="text-slate-500 text-[10px]">[{log.dateString}]</span> <br/>
                                                    <span className="text-blue-400 font-bold">MR_{log.empId}</span> | {log.action} : {log.target}
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}
                            </div>
                        ) : activeTab === "requests" ? (
                            /* 사용자 - 브로슈어 신청 */
                            <div className="bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-100 text-center animate-in fade-in slide-in-from-bottom-4">
                                <div className="text-center mb-8">
                                    <div className="w-16 h-16 bg-blue-50 text-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-inner rotate-3 text-center"><Icon name="cart" size={32}/></div>
                                    <h2 className="text-2xl font-black text-slate-800 tracking-tight text-center">브로슈어 신청</h2>
                                </div>
                                <form onSubmit={async (e) => {
                                    e.preventDefault();
                                    await window.FB.addDoc(window.FB.collection(window.FB.db, `/artifacts/${window.FB.appId}/public/data/requests`), { ...requestForm, empId, completed: false, timestamp: Date.now(), dateString: new Date().toLocaleString('ko-KR') });
                                    logAction("신청", requestForm.brochureName);
                                    alert("성공적으로 신청되었습니다.");
                                    setRequestForm({ brochureName: "", requesterName: "", phone: "", office: "", quantity: "", accountName: "", accountCode: "" });
                                }} className="space-y-4 text-center">
                                    <select className="w-full p-4 bg-slate-50 border-2 rounded-2xl font-bold appearance-none text-center outline-none focus:border-blue-500" value={requestForm.brochureName} onChange={e => setRequestForm({...requestForm, brochureName: e.target.value})} required>
                                        <option value="">필요한 브로슈어를 선택하세요</option>
                                        {messages.filter(m => m.category === "제품 브로슈어").map(m => <option key={m.id} value={m.title}>{m.title}</option>)}
                                    </select>
                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 text-center">
                                        <div className="relative text-center">
                                            <Icon name="building" size={16} className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-300 text-center"/>
                                            <input className="w-full pl-11 pr-4 py-4 bg-slate-50 border-2 border-slate-50 rounded-2xl font-bold text-sm outline-none focus:border-blue-500 text-center sm:text-left" placeholder="거래처명" value={requestForm.accountName} onChange={e => setRequestForm({...requestForm, accountName: e.target.value})} required />
                                        </div>
                                        <div className="relative text-center">
                                            <Icon name="finger" size={16} className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-300 text-center"/>
                                            <input className="w-full pl-11 pr-4 py-4 bg-slate-50 border-2 border-slate-50 rounded-2xl font-bold text-sm outline-none focus:border-blue-500 text-center sm:text-left" placeholder="거래처코드" value={requestForm.accountCode} onChange={e => setRequestForm({...requestForm, accountCode: e.target.value})} required />
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-3 text-center">
                                        <input className="p-4 bg-slate-50 border-2 border-slate-50 rounded-2xl font-bold text-center text-sm outline-none focus:border-blue-500" placeholder="신청자명" value={requestForm.requesterName} onChange={e => setRequestForm({...requestForm, requesterName: e.target.value})} required />
                                        <input type="number" inputMode="numeric" className="p-4 bg-slate-50 border-2 border-slate-50 rounded-2xl font-bold text-center text-sm outline-none focus:border-blue-500" placeholder="수량(부)" value={requestForm.quantity} onChange={e => setRequestForm({...requestForm, quantity: e.target.value})} required />
                                    </div>
                                    <input className="w-full p-4 bg-slate-50 border-2 border-slate-50 rounded-2xl font-bold text-center text-sm outline-none focus:border-blue-500" placeholder="연락처 (010-0000-0000)" value={requestForm.phone} onChange={e => setRequestForm({...requestForm, phone: e.target.value})} required />
                                    <input className="w-full p-4 bg-slate-50 border-2 border-slate-50 rounded-2xl font-bold text-center text-sm outline-none focus:border-blue-500" placeholder="사무소명 (예: 강남사무소)" value={requestForm.office} onChange={e => setRequestForm({...requestForm, office: e.target.value})} required />
                                    <button className="w-full bg-blue-600 text-white py-5 rounded-2xl font-black shadow-xl shadow-blue-100 active:scale-95 transition-all text-center flex items-center justify-center gap-2"><Icon name="save" size={18}/> 신청 등록하기</button>
                                </form>
                            </div>
                        ) : (
                            /* 사용자 - 자료실 / 교육영상 */
                            <div className="space-y-4 text-center animate-in fade-in slide-in-from-bottom-4">
                                <div className="relative group text-center">
                                    <Icon name="search" size={20} className="absolute left-5 top-1/2 -translate-y-1/2 text-slate-300 transition-colors group-focus-within:text-blue-500 text-center" />
                                    <input className="w-full pl-14 pr-6 py-5 bg-white rounded-[2rem] border-none shadow-sm outline-none text-sm font-black focus:ring-4 focus:ring-blue-50 transition-all text-center" placeholder="키워드 검색..." value={searchQuery} onChange={e => setSearchQuery(e.target.value)} />
                                </div>
                                {activeTab === "materials" && (
                                    <div className="flex gap-2 overflow-x-auto no-scrollbar py-2 text-center">
                                        {CATEGORIES.filter(c => c !== "교육 영상" && c !== "제품 브로슈어").map(cat => (
                                            <button key={cat} onClick={() => setSelectedCategory(cat)} className={`whitespace-nowrap px-4 py-2 rounded-2xl text-[10px] font-black transition-all text-center ${selectedCategory === cat ? "bg-slate-800 text-white shadow-lg scale-105" : "bg-white text-slate-400 border border-slate-100"}`}>
                                                {cat}
                                            </button>
                                        ))}
                                    </div>
                                )}
                                <div className="grid grid-cols-1 gap-4 text-center">
                                    {filteredDisplay.map(item => (
                                        <div key={item.id} className="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-50 text-center active:scale-[0.98] transition-all group">
                                            <span className="text-[9px] font-black px-2 py-1 bg-blue-50 text-blue-600 rounded-md uppercase mb-2 inline-block tracking-wider text-center">{item.category}</span>
                                            <h3 className="text-lg font-black text-slate-800 mb-2 leading-tight group-hover:text-blue-600 transition-colors text-center">{item.title}</h3>
                                            {item.description && <p className="text-[12px] text-slate-400 font-medium mb-5 line-clamp-2 leading-relaxed text-center">{item.description}</p>}
                                            <div className="flex gap-2 text-center">
                                                {item.pdfUrl && <a href={item.pdfUrl} target="_blank" onClick={() => logAction("PDF 열람", item.title)} className="flex-1 bg-red-50 text-red-600 py-4 rounded-2xl text-[10px] font-black border border-red-100 text-center flex items-center justify-center gap-1"><Icon name="download" size={14}/> PDF</a>}
                                                {item.pptUrl && <a href={item.pptUrl} target="_blank" onClick={() => logAction("PPT 열람", item.title)} className="flex-1 bg-orange-50 text-orange-600 py-4 rounded-2xl text-[10px] font-black border border-orange-100 text-center flex items-center justify-center gap-1"><Icon name="download" size={14}/> PPT</a>}
                                                {item.youtubeUrl && <a href={item.youtubeUrl} target="_blank" onClick={() => logAction("영상 시청", item.title)} className="w-full bg-red-600 text-white py-4 rounded-2xl text-xs font-black shadow-lg shadow-red-100 flex items-center justify-center gap-2 text-center"><Icon name="youtube" size={16}/> 영상 시청</a>}
                                            </div>
                                        </div>
                                    ))}
                                    {filteredDisplay.length === 0 && <p className="py-20 text-center text-slate-300 font-bold italic text-sm">등록된 콘텐츠가 없습니다.</p>}
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Admin Auth Modal */}
                    {showAdminLogin && (
                        <div className="fixed inset-0 z-[60] flex items-center justify-center bg-slate-900/50 backdrop-blur-md p-4 text-center">
                            <div className="bg-white w-full max-w-sm rounded-[2.5rem] p-10 shadow-2xl animate-in zoom-in text-center">
                                <h2 className="font-black text-lg mb-8 flex items-center justify-center gap-2 uppercase tracking-widest text-center"><Icon name="lock" size={20} className="text-blue-600"/> PM AUTH</h2>
                                <form onSubmit={(e) => {
                                    e.preventDefault();
                                    if (passwordInput === ADMIN_PASSWORD) { setIsAdminMode(true); setShowAdminLogin(false); setPasswordInput(""); setActiveTab("requests"); }
                                    else alert("비밀번호 불일치");
                                }} className="space-y-4 text-center">
                                    <input type="password" autoFocus className="w-full p-5 bg-slate-50 border-2 border-slate-100 rounded-2xl text-center text-2xl font-black outline-none focus:border-blue-500 text-center" placeholder="••••" value={passwordInput} onChange={e => setPasswordInput(e.target.value)} />
                                    <button className="w-full bg-slate-900 text-white py-5 rounded-2xl font-black shadow-xl text-center">인증 확인</button>
                                </form>
                                <button onClick={() => setShowAdminLogin(false)} className="w-full mt-4 text-[10px] text-slate-400 font-bold uppercase tracking-[0.2em] text-center">닫기</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
