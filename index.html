                settings: <g><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></g>,
                close: <g><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></g>,
                messageSquare: <g><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></g>,
                home: <g><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></g>,
                users: <g><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></g>,
                presentation: <g><path d="M2 3h20"/><path d="M21 3v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V3"/><path d="M7 21h10"/><path d="M12 16v5"/></g>,
                helpCircle: <g><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></g>
            };
            return (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name]}
                </svg>
            );
        };

        const ADMIN_PASSWORD = "1024";

        const App = () => {
            const [user, setUser] = useState(null);
            
            const [empId, setEmpId] = useState(sessionStorage.getItem('mr_emp_id') || "");
            const [isLoggedIn, setIsLoggedIn] = useState(!!sessionStorage.getItem('mr_emp_id'));
            
            const [activeTab, setActiveTab] = useState("home"); 
            const [searchQuery, setSearchQuery] = useState("");
            const [selectedCategory, setSelectedCategory] = useState("전체");
            const [isAdminMode, setIsAdminMode] = useState(false);
            const [showAdminLogin, setShowAdminLogin] = useState(false);
            const [editingId, setEditingId] = useState(null);
            
            const [messages, setMessages] = useState([]);
            const [videos, setVideos] = useState([]);
            const [requests, setRequests] = useState([]);
            const [requests301, setRequests301] = useState([]);
            const [sympRequests, setSympRequests] = useState([]);
            const [inquiries, setInquiries] = useState([]);
            const [logs, setLogs] = useState([]);
            const [symposiumList, setSymposiumList] = useState([]);
            const [categoriesList, setCategoriesList] = useState([]);
            const [videoCategoriesList, setVideoCategoriesList] = useState([]);
            
            const [mrPassword, setMrPassword] = useState("1111");
            const [quizConfig, setQuizConfig] = useState({ question: "ㅈㄴㅂㅇ", isActive: true });
            
            const [loginEmpId, setLoginEmpId] = useState("");
            const [loginPassword, setLoginPassword] = useState("");
            const [adminPasswordInput, setAdminPasswordInput] = useState("");
            const [newMrPassword, setNewMrPassword] = useState("1111");
            
            const [editingCategoryId, setEditingCategoryId] = useState(null);
            const [editingCategoryName, setEditingCategoryName] = useState("");

            const [quizAnswer, setQuizAnswer] = useState({ division: "", team: "", name: "", answer: "" });
            const [formState, setFormState] = useState({ title: "", category: "", description: "", pdfUrl: "", pptUrl: "", youtubeUrl: "", thumbnail: "" });
            const [requestForm, setRequestForm] = useState({ brochureName: "", requesterName: "", phone: "", office: "", quantity: "", accountName: "", accountCode: "" });
            const [inquiryForm, setInquiryForm] = useState({ division: "", team: "", name: "", content: "" });
            const [newCategoryName, setNewCategoryName] = useState("");
            const [newVideoCategoryName, setNewVideoCategoryName] = useState("");
            const [newSymposiumName, setNewSymposiumName] = useState("");
            const [newBrochureName, setNewBrochureName] = useState("");
            const [quizSettingForm, setQuizSettingForm] = useState({ question: "", isActive: true });
            
            // 301 Form 상태 (제목, 장소, 날짜 추가)
            const [form301Info, setForm301Info] = useState({ title: "", date: "", location: "", division: "", team: "", name: "", phone: "" });
            const [form301Account, setForm301Account] = useState({ accountName: "", accountCode: "", targetProduct: "자누비아", rxAmount: "" });
            const [local301List, setLocal301List] = useState([]);
            
            // 심포지엄 Form 상태 (연락처, 닥터명, 닥터연락처, 요청사항 추가)
            const [sympForm, setSympForm] = useState({ symposiumName: "", division: "", team: "", name: "", phone: "", accountName: "", accountCode: "", targetProduct: "자누비아", rxAmount: "", doctorName: "", doctorPhone: "", memo: "" });

            useEffect(() => {
                const init = setInterval(() => {
                    if (window.FB) {
                        clearInterval(init);
                        const { auth, signInAnonymously, onAuthStateChanged } = window.FB;
                        signInAnonymously(auth).then(() => {
                            onAuthStateChanged(auth, setUser);
                        }).catch(err => console.error("Login Error:", err));
                    }
                }, 500);
            }, []);

            useEffect(() => {
                if (!user || !window.FB) return;
                const { db, appId, collection, doc, setDoc, onSnapshot } = window.FB;
                const base = `/artifacts/${appId}/public/data/`;

                const unsubSettings = onSnapshot(doc(db, `${base}settings`, 'config'), (docSnap) => {
                    if (docSnap.exists()) {
                        setMrPassword(docSnap.data().mrPassword || "1111");
                        setNewMrPassword(docSnap.data().mrPassword || "1111");
                    } else if (isAdminMode) {
                        setDoc(doc(db, `${base}settings`, 'config'), { mrPassword: "1111" }, { merge: true });
                    }
                });

                const unsubQuiz = onSnapshot(doc(db, `${base}settings`, 'quiz'), (docSnap) => {
                    if (docSnap.exists()) {
                        setQuizConfig(docSnap.data());
                        setQuizSettingForm(docSnap.data());
                    }
                });

                const listeners = [
                    { col: 'messages', setter: setMessages, sortField: 'timestamp' },
                    { col: 'videos', setter: setVideos, sortField: 'timestamp' },
                    { col: 'requests', setter: setRequests, sortField: 'timestamp' },
                    { col: 'requests_301', setter: setRequests301, sortField: 'timestamp' },
                    { col: 'symposium_requests', setter: setSympRequests, sortField: 'timestamp' },
                    { col: 'inquiries', setter: setInquiries, sortField: 'timestamp' },
                    { col: 'symposium_list', setter: setSymposiumList, sortField: 'timestamp' },
                    { col: 'categories', setter: setCategoriesList, sortField: 'order' },
                    { col: 'videoCategories', setter: setVideoCategoriesList, sortField: 'order' }
                ].map(item => 
                    onSnapshot(collection(db, `${base}${item.col}`), (snap) => {
                        let data = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                        if (item.sortField === 'order') {
                            data.sort((a,b) => (a.order || 0) - (b.order || 0));
                        } else {
                            data.sort((a, b) => b.timestamp - a.timestamp);
                        }
                        item.setter(data);
                    })
                );

                return () => { unsubSettings(); unsubQuiz(); listeners.forEach(unsub => unsub()); };
            }, [user, isAdminMode]);

            const fetchRecentLogs = useCallback(async () => {
                if (!user || !window.FB || !isAdminMode) return;
                const { db, appId, collection, getDocs, query, orderBy, limit } = window.FB;
                const logsRef = collection(db, `/artifacts/${appId}/public/data/logs`);
                const q = query(logsRef, orderBy("timestamp", "desc"), limit(50));
                const snap = await getDocs(q);
                setRecentLogs(snap.docs.map(d => ({id: d.id, ...d.data()})));
            }, [user, isAdminMode]);

            const handleUserLogin = (e) => {
                e.preventDefault();
                if (!/^\d{6}$/.test(loginEmpId)) return alert("사번 6자리를 숫자로 입력하세요.");
                if (loginPassword !== mrPassword) return alert("접속 암호가 일치하지 않습니다.");
                sessionStorage.setItem('mr_emp_id', loginEmpId);
                setEmpId(loginEmpId);
                setIsLoggedIn(true);
                logAction("접속", "시스템 로그인");
            };

            const handleLogout = () => {
                sessionStorage.removeItem('mr_emp_id');
                setEmpId(""); setLoginEmpId(""); setLoginPassword("");
                setIsLoggedIn(false); setIsAdminMode(false);
            };

            const logAction = async (actionType, targetTitle) => {
                if (!user || !window.FB) return;
                try {
                    await window.FB.addDoc(window.FB.collection(window.FB.db, 'artifacts', window.FB.appId, 'public', 'data', 'logs'), {
                        empId: sessionStorage.getItem('mr_emp_id') || empId, action: actionType, target: targetTitle, 
                        timestamp: Date.now(), dateString: new Date().toLocaleString('ko-KR')
                    });
                } catch (e) { console.error(e); }
            };

            const toggleStatus = async (collectionName, itemId, currentStatus) => {
                if (!user || !window.FB) return;
                await window.FB.updateDoc(window.FB.doc(window.FB.db, 'artifacts', window.FB.appId, 'public', 'data', collectionName, itemId), { completed: !currentStatus });
            };

            const deleteItem = async (collectionName, itemId) => {
                if (!user || !window.FB || !window.confirm("정말 삭제하시겠습니까?")) return;
                await window.FB.deleteDoc(window.FB.doc(window.FB.db, 'artifacts', window.FB.appId, 'public', 'data', collectionName, itemId));
            };

            const moveCategory = async (list, dbPath, index, direction) => {
                if (!window.FB) return;
                const newIndex = index + direction;
                if (newIndex < 0 || newIndex >= list.length) return;

                const newList = [...list];
                const temp = newList[index];
                newList[index] = newList[newIndex];
                newList[newIndex] = temp;
                
                if (dbPath.includes('video')) setVideoCategoriesList(newList);
                else setCategoriesList(newList);

                const { db, appId, doc, updateDoc } = window.FB;
                try {
                    await Promise.all(newList.map((item, i) => updateDoc(doc(db, `/artifacts/${appId}/public/data/${dbPath}`, item.id), { order: i })));
                } catch(e) { console.error("순서 업데이트 실패:", e); }
            };

            const handleUpdateCategory = async (dbPath, item, newName) => {
                if (!window.FB || !newName.trim()) return;
                const finalName = newName.trim();
                if (item.name === finalName) return setEditingCategoryId(null);
                
                const { db, appId, doc, updateDoc } = window.FB;
                try {
                    await updateDoc(doc(db, `/artifacts/${appId}/public/data/${dbPath}`, item.id), { name: finalName });
                    const msgsToUpdate = messages.filter(m => m.category === item.name);
                    if (msgsToUpdate.length > 0) {
                        const updatePromises = msgsToUpdate.map(m => updateDoc(doc(db, `/artifacts/${appId}/public/data/messages`, m.id), { category: finalName }));
                        await Promise.all(updatePromises);
                    }
                    alert("카테고리명이 수정되었습니다.");
                } catch (error) { console.error(error); }
                setEditingCategoryId(null);
            };

            const handleDownloadExcel = async () => {
                if (!window.XLSX) return alert("엑셀 모듈 로딩 중입니다. 잠시 후 시도해주세요.");
                try {
                    const wb = window.XLSX.utils.book_new();
                    const sortAsc = (arr) => [...arr].sort((a,b) => a.timestamp - b.timestamp);

                    const logSnap = await window.FB.getDocs(window.FB.collection(window.FB.db, `/artifacts/${window.FB.appId}/public/data/logs`));
                    const allLogs = logSnap.docs.map(d => d.data());

                    const logData = sortAsc(allLogs).map(l => ({ 사번: l.empId, 활동: l.action, 대상: l.target, 일시: l.dateString }));
                    window.XLSX.utils.book_append_sheet(wb, window.XLSX.utils.json_to_sheet(logData), "전체활동로그");

                    const reqData = sortAsc(requests).map(r => ({ 사번: r.empId, 성함: r.requesterName, 연락처: r.phone, 사무소: r.office, 거래처명: r.accountName, 거래처코드: r.accountCode, 품목: r.brochureName, 수량: r.quantity, 상태: r.completed ? "배송완료" : "준비중", 일시: r.dateString }));
                    window.XLSX.utils.book_append_sheet(wb, window.XLSX.utils.json_to_sheet(reqData), "브로슈어신청");

                    // 301 다기관 설명회
                    const r301Data = sortAsc(requests301).map(r => ({ 신청제목: r.title, 진행날짜: r.date, 진행장소: r.location, 사번: r.empId, 사업부: r.division, 팀: r.team, 담당자: r.name, 연락처: r.phone, 거래처명: r.accountName, 거래처코드: r.accountCode, 타겟품목: r.targetProduct, 처방금액: r.rxAmount, 상태: r.completed ? "처리완료" : "대기", 일시: r.dateString }));

                        const MAX_WIDTH = 500;
                        let width = img.width;
                        let height = img.height;
                        if (width > MAX_WIDTH) { height = Math.round((height * MAX_WIDTH) / width); width = MAX_WIDTH; }
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);

                                                    <button className="w-full bg-blue-600 text-white py-4 rounded-xl font-black active:scale-95 shadow-lg shadow-blue-100">정답 제출하기</button>
                                                </form>
                                            </div>
                                        ) : (
                                            <p className="text-slate-400 font-bold py-10">진행 중인 퀴즈가 없습니다.</p>
                                        )}
                                    </div>
                                )}

                                {activeTab === 'brochures' && (
                                    <div className="space-y-6">
                                        <div className="bg-white p-6 sm:p-8 rounded-[2.5rem] shadow-sm border border-slate-100 text-center">
                                            <h2 className="text-xl font-black text-slate-800 mb-6 flex items-center justify-center gap-2"><Icon name="cart" size={24} className="text-blue-600"/> 브로슈어 신청</h2>
                                            <form onSubmit={submitBrochure} className="space-y-3">
                                                <select className="w-full p-4 bg-slate-50 border-2 rounded-xl text-sm font-bold outline-none focus:border-blue-500 text-center appearance-none" value={requestForm.brochureName} onChange={e=>setRequestForm({...requestForm, brochureName: e.target.value})} required>
                                                    <option value="" disabled hidden>-- 브로슈어 품목 선택 --</option>
                                                    {messages.filter(m=>m.category==="제품 브로슈어").map(m=><option key={m.id} value={m.title}>{m.title}</option>)}
                                                </select>
                                                <div className="grid grid-cols-2 gap-3">
                                                    <input className="p-3 bg-slate-50 border-2 rounded-xl text-sm font-bold text-center" placeholder="거래처명" value={requestForm.accountName} onChange={e=>setRequestForm({...requestForm, accountName: e.target.value})} required/>
                                                    <input className="p-3 bg-slate-50 border-2 rounded-xl text-sm font-bold text-center" placeholder="거래처코드" value={requestForm.accountCode} onChange={e=>setRequestForm({...requestForm, accountCode: e.target.value})} required/>
                                                    <input className="p-3 bg-slate-50 border-2 rounded-xl text-sm font-bold text-center" placeholder="신청자명" value={requestForm.requesterName} onChange={e=>setRequestForm({...requestForm, requesterName: e.target.value})} required/>
                                                    <input type="number" className="p-3 bg-slate-50 border-2 rounded-xl text-sm font-bold text-center" placeholder="수량(부)" value={requestForm.quantity} onChange={e=>setRequestForm({...requestForm, quantity: e.target.value})} required/>
                                                </div>
                                                <input className="w-full p-3 bg-slate-50 border-2 rounded-xl text-sm font-bold text-center" placeholder="연락처 (필수)" value={requestForm.phone} onChange={e=>setRequestForm({...requestForm, phone: e.target.value})} required/>
                                                <input className="w-full p-3 bg-slate-50 border-2 rounded-xl text-sm font-bold text-center" placeholder="수령 사무소명" value={requestForm.office} onChange={e=>setRequestForm({...requestForm, office: e.target.value})} required/>
                                                <button className="w-full bg-blue-600 text-white py-4 rounded-xl font-black flex items-center justify-center gap-2"><Icon name="save" size={18}/> 신청하기</button>
                                            </form>
                                        </div>
                                        
                                        <div className="bg-white rounded-[2rem] border p-4 shadow-sm">
                                            <h3 className="font-black text-sm text-slate-600 mb-3 text-center">나의 브로슈어 배송 현황</h3>
                                            <div className="space-y-2 max-h-60 overflow-y-auto custom-scrollbar">
                                                {requests.filter(r => r.empId === empId).map(req => (
                                                    <div key={req.id} className="p-3 bg-slate-50 rounded-xl flex justify-between items-center border">
                                                        <div className="text-left">
                                                            <p className="text-xs font-bold text-slate-800 line-clamp-1">{req.brochureName} ({req.quantity}부)</p>
                                                            <p className="text-[10px] text-slate-500">{req.dateString.slice(0, 11)}</p>
                                                        </div>
                                                        <span className={`text-[10px] font-black px-2 py-1 rounded-full whitespace-nowrap ${req.completed ? 'bg-green-100 text-green-700' : 'bg-slate-200 text-slate-600'}`}>
                                                            {req.completed ? '배송 완료' : '준비 중'}
                                                        </span>
                                                    </div>
                                                ))}
                                                {requests.filter(r => r.empId === empId).length === 0 && <p className="text-xs text-slate-400 text-center py-4">신청 내역이 없습니다.</p>}
                                            </div>
                                        </div>
                                    </div>
                                )}

                                {activeTab === '301' && (
                                    <div className="bg-white p-6 sm:p-8 rounded-[2.5rem] shadow-sm border border-slate-100 text-center">
                                        <h2 className="text-xl font-black text-slate-800 mb-6 flex items-center justify-center gap-2"><Icon name="users" size={24} className="text-orange-500"/> 301 다기관 설명회 신청</h2>
                                        
                                        <div className="bg-orange-50 p-4 rounded-2xl mb-6 space-y-3">
                                            <p className="text-xs font-bold text-orange-700 text-left">1. 기본 정보 입력</p>
                                            <input className="w-full p-3 bg-white border rounded-xl text-xs font-bold text-center" placeholder="설명회 제목 (예: 서울 강남권 301 설명회)" value={form301Info.title} onChange={e=>setForm301Info({...form301Info, title: e.target.value})}/>
                                            <div className="grid grid-cols-2 gap-2">
                                                <input type="date" className="p-3 bg-white border rounded-xl text-xs font-bold text-center" value={form301Info.date} onChange={e=>setForm301Info({...form301Info, date: e.target.value})}/>
                                                <input className="p-3 bg-white border rounded-xl text-xs font-bold text-center" placeholder="진행 장소" value={form301Info.location} onChange={e=>setForm301Info({...form301Info, location: e.target.value})}/>
                                            </div>
                                        </div>
                                        
                                        <div className="bg-blue-50 p-4 rounded-2xl mb-6 space-y-3">
                                            <p className="text-xs font-bold text-blue-700 text-left">2. 담당자 정보 입력</p>
                                            <div className="grid grid-cols-2 gap-2">
                                                <input className="p-3 bg-white border rounded-xl text-xs font-bold text-center" placeholder="사업부명" value={form301Info.division} onChange={e=>setForm301Info({...form301Info, division: e.target.value})}/>
                                                <input className="p-3 bg-white border rounded-xl text-xs font-bold text-center" placeholder="팀명" value={form301Info.team} onChange={e=>setForm301Info({...form301Info, team: e.target.value})}/>
                                                <input className="p-3 bg-white border rounded-xl text-xs font-bold text-center" placeholder="담당자명" value={form301Info.name} onChange={e=>setForm301Info({...form301Info, name: e.target.value})}/>
                                                <input className="p-3 bg-white border rounded-xl text-xs font-bold text-center" placeholder="연락처" value={form301Info.phone} onChange={e=>setForm301Info({...form301Info, phone: e.target.value})}/>
                                            </div>
                                        </div>

                                        <div className="bg-slate-50 p-4 rounded-2xl mb-6 space-y-3 border">
                                            <p className="text-xs font-bold text-slate-700 text-left">3. 거래처 리스트 추가</p>
                                            <div className="grid grid-cols-2 gap-2">
                                                <input className="p-3 bg-white border rounded-xl text-xs font-bold text-center" placeholder="거래처명" value={form301Account.accountName} onChange={e=>setForm301Account({...form301Account, accountName: e.target.value})}/>
                                                <input className="p-3 bg-white border rounded-xl text-xs font-bold text-center" placeholder="코드" value={form301Account.accountCode} onChange={e=>setForm301Account({...form301Account, accountCode: e.target.value})}/>
                                                <select className="p-3 bg-white border rounded-xl text-xs font-bold text-center" value={form301Account.targetProduct} onChange={e=>setForm301Account({...form301Account, targetProduct: e.target.value})}>
                                                    <option value="자누비아">자누비아</option>
                                                    <option value="엠파맥스">엠파맥스</option>
                                                </select>
                                                <input type="number" className="p-3 bg-white border rounded-xl text-xs font-bold text-center" placeholder="처방금액(원)" value={form301Account.rxAmount} onChange={e=>setForm301Account({...form301Account, rxAmount: e.target.value})}/>
                                            </div>
                                            <button type="button" onClick={add301Account} className="w-full bg-slate-800 text-white py-3 rounded-xl text-xs font-black flex items-center justify-center gap-1"><Icon name="plus" size={16}/> 목록에 추가</button>
                                        </div>

                                        {local301List.length > 0 && (
                                            <div className="mb-6 border rounded-xl overflow-hidden">
                                                <div className="bg-slate-100 p-2 text-[10px] font-bold text-slate-500">추가된 거래처 ({local301List.length}건)</div>
                                                <ul className="divide-y max-h-40 overflow-y-auto custom-scrollbar">
                                                    {local301List.map((acc, idx) => (
                                                        <li key={idx} className="p-2 text-left text-[10px] flex justify-between bg-white">
                                                            <span><b>{acc.accountName}</b> ({acc.targetProduct}) - {acc.rxAmount}원</span>
                                                            <button onClick={()=>setLocal301List(local301List.filter((_,i)=>i!==idx))} className="text-red-500"><Icon name="trash" size={12}/></button>
                                                        </li>
                                                    ))}
                                                </ul>
                                            </div>
                                        )}

                                        <button onClick={submit301All} className="w-full bg-orange-500 text-white py-5 rounded-xl font-black text-sm flex items-center justify-center gap-2 shadow-lg"><Icon name="save" size={18}/> 최종 제출하기</button>
                                    </div>
                                )}

                                {activeTab === 'symp' && (
                                    <div className="bg-white p-6 sm:p-8 rounded-[2.5rem] shadow-sm border border-slate-100 text-center">
                                        <h2 className="text-xl font-black text-slate-800 mb-6 flex items-center justify-center gap-2"><Icon name="presentation" size={24} className="text-green-600"/> 심포지엄 모객 신청</h2>
                                        <form onSubmit={submitSymp} className="space-y-4">
                                            <select className="w-full p-4 bg-slate-50 border-2 rounded-xl text-sm font-bold text-center appearance-none outline-none focus:border-green-500" value={sympForm.symposiumName} onChange={e=>setSympForm({...sympForm, symposiumName: e.target.value})} required>
                                                <option value="" disabled hidden>-- 참석할 심포지엄 선택 --</option>
                                                {symposiumList.map(s => <option key={s.id} value={s.name}>{s.name}</option>)}
                                            </select>
                                            
                                            <div className="bg-slate-50 p-4 rounded-2xl border space-y-3">
                                                <p className="text-xs font-bold text-slate-500 text-left">담당자 정보</p>
                                                <div className="grid grid-cols-2 gap-3">
                                                    <input className="p-3 bg-white border rounded-xl text-xs font-bold text-center" placeholder="사업부명" value={sympForm.division} onChange={e=>setSympForm({...sympForm, division: e.target.value})} required/>
                                                    <input className="p-3 bg-white border rounded-xl text-xs font-bold text-center" placeholder="팀명" value={sympForm.team} onChange={e=>setSympForm({...sympForm, team: e.target.value})} required/>
                                                    <input className="p-3 bg-white border rounded-xl text-xs font-bold text-center" placeholder="담당자명" value={sympForm.name} onChange={e=>setSympForm({...sympForm, name: e.target.value})} required/>
                                                    <input className="p-3 bg-white border rounded-xl text-xs font-bold text-center" placeholder="담당자 연락처" value={sympForm.phone} onChange={e=>setSympForm({...sympForm, phone: e.target.value})} required/>
                                                </div>
                                            </div>

                                            <div className="bg-slate-50 p-4 rounded-2xl border space-y-3">
                                                <p className="text-xs font-bold text-slate-500 text-left">거래처 및 모객 닥터 정보</p>
                                                <div className="grid grid-cols-2 gap-3">
                                                    <input className="p-3 bg-white border rounded-xl text-xs font-bold text-center" placeholder="거래처명" value={sympForm.accountName} onChange={e=>setSympForm({...sympForm, accountName: e.target.value})} required/>
                                                    <input className="p-3 bg-white border rounded-xl text-xs font-bold text-center" placeholder="거래처코드" value={sympForm.accountCode} onChange={e=>setSympForm({...sympForm, accountCode: e.target.value})} required/>
                                                    <select className="p-3 bg-white border rounded-xl text-xs font-bold text-center" value={sympForm.targetProduct} onChange={e=>setSympForm({...sympForm, targetProduct: e.target.value})}>
                                                        <option value="자누비아">자누비아</option>
                                                        <option value="엠파맥스">엠파맥스</option>
                                                    </select>
                                                    <input type="number" className="p-3 bg-white border rounded-xl text-xs font-bold text-center" placeholder="타겟 처방금액(원)" value={sympForm.rxAmount} onChange={e=>setSympForm({...sympForm, rxAmount: e.target.value})} required/>
                                                    <input className="p-3 bg-white border rounded-xl text-xs font-bold text-center" placeholder="모객 닥터명" value={sympForm.doctorName} onChange={e=>setSympForm({...sympForm, doctorName: e.target.value})} required/>
                                                    <input className="p-3 bg-white border rounded-xl text-xs font-bold text-center" placeholder="닥터 연락처" value={sympForm.doctorPhone} onChange={e=>setSympForm({...sympForm, doctorPhone: e.target.value})} required/>
                                                </div>
                                                <textarea className="w-full p-3 bg-white border rounded-xl text-xs font-bold h-20 outline-none resize-none" placeholder="기타 요청 사항" value={sympForm.memo} onChange={e=>setSympForm({...sympForm, memo: e.target.value})} />
                                            </div>

                                            <button className="w-full bg-green-600 text-white py-5 rounded-xl font-black text-sm flex items-center justify-center gap-2 shadow-lg"><Icon name="save" size={18}/> 모객 등록하기</button>
                                        </form>
                                    </div>
                                )}

                                {activeTab === 'inquiries' && (
                                    <div className="bg-white p-6 sm:p-8 rounded-[2.5rem] shadow-sm border border-slate-100 text-center">
                                        <div className="w-16 h-16 bg-purple-50 text-purple-600 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-inner"><Icon name="messageSquare" size={32}/></div>
                                        <h2 className="text-xl font-black text-slate-800 mb-6">문의 및 건의사항</h2>
                                        <form onSubmit={submitInquiry} className="space-y-3">
                                            <div className="grid grid-cols-2 gap-3">
                                                <input className="p-3 bg-slate-50 border-2 rounded-xl text-sm font-bold text-center outline-none focus:border-purple-500" placeholder="사업부명" value={inquiryForm.division} onChange={e=>setInquiryForm({...inquiryForm, division: e.target.value})} required/>
                                                <input className="p-3 bg-slate-50 border-2 rounded-xl text-sm font-bold text-center outline-none focus:border-purple-500" placeholder="팀명" value={inquiryForm.team} onChange={e=>setInquiryForm({...inquiryForm, team: e.target.value})} required/>
                                            </div>
                                            <input className="w-full p-3 bg-slate-50 border-2 rounded-xl text-sm font-bold text-center outline-none focus:border-purple-500" placeholder="담당자명" value={inquiryForm.name} onChange={e=>setInquiryForm({...inquiryForm, name: e.target.value})} required/>
                                            <textarea className="w-full p-4 bg-slate-50 border-2 rounded-xl text-sm font-bold h-32 text-left resize-none outline-none focus:border-purple-500" placeholder="자유롭게 의견을 남겨주세요." value={inquiryForm.content} onChange={e=>setInquiryForm({...inquiryForm, content: e.target.value})} required/>
                                            <button className="w-full bg-purple-600 text-white py-4 rounded-xl font-black shadow-lg active:scale-95 transition-all flex items-center justify-center gap-2">의견 접수하기</button>
                                        </form>
                                    </div>
                                )}

                                {(activeTab === 'materials' || activeTab === 'videos') && (
                                    <div className="space-y-4">
                                        <div className="relative group text-center">
                                            <Icon name="search" size={20} className="absolute left-5 top-1/2 -translate-y-1/2 text-slate-300 group-focus-within:text-blue-500 transition-colors text-center" />
                                            <input className="w-full pl-14 pr-6 py-5 bg-white rounded-[2rem] border-none shadow-sm outline-none text-sm font-black focus:ring-4 focus:ring-blue-50 transition-all text-center" placeholder="키워드 검색..." value={searchQuery} onChange={e => setSearchQuery(e.target.value)} />
                                        </div>
                                        
                                        <div className="w-full overflow-x-auto custom-scrollbar py-2">
                                            <div className="flex gap-2 w-max px-1">
                                                {['전체', ...(activeTab === "materials" ? categoriesList : videoCategoriesList).map(c => c.name)].map(cat => (
                                                    <button key={cat} onClick={() => setSelectedCategory(cat)} className={`flex-shrink-0 whitespace-nowrap px-5 py-2.5 rounded-full text-[11px] font-black transition-all text-center ${selectedCategory === cat ? "bg-slate-800 text-white shadow-lg scale-105" : "bg-white text-slate-500 border border-slate-100 hover:bg-slate-50"}`}>
                                                        {cat}
                                                    </button>
                                                ))}
                                            </div>
                                        </div>

                                        <div className="grid grid-cols-1 gap-4 text-center mt-2">
                                            {filteredDisplay.map(item => (
                                                <div key={item.id} className="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-50 text-center active:scale-[0.98] transition-all group overflow-hidden">
                                                    {item.thumbnail && (
                                                        <div className="mb-4 -mx-6 -mt-6">
                                                            <img src={item.thumbnail} alt={item.title} className="w-full h-40 sm:h-48 object-cover" />
                                                        </div>
                                                    )}
                                                    
                                                    <span className="text-[9px] font-black px-2 py-1 bg-blue-50 text-blue-600 rounded-md uppercase mb-2 inline-block tracking-wider text-center">{item.category}</span>
                                                    <h3 className="text-lg font-black text-slate-800 mb-2 leading-tight group-hover:text-blue-600 transition-colors text-center">{item.title}</h3>
                                                    {item.description && <p className="text-[12px] text-slate-400 font-medium mb-5 line-clamp-2 leading-relaxed text-center">{item.description}</p>}
                                                    
                                                    <div className="flex gap-2 text-center mt-4">
                                                        {item.pdfUrl && <a href={item.pdfUrl} target="_blank" rel="noreferrer" onClick={() => logAction("PDF 열람", item.title)} className="flex-1 bg-red-50 text-red-600 py-4 rounded-2xl text-[10px] font-black border border-red-100 text-center flex items-center justify-center gap-1 hover:bg-red-100 transition-colors"><Icon name="download" size={14}/> PDF</a>}
                                                        {item.pptUrl && <a href={item.pptUrl} target="_blank" rel="noreferrer" onClick={() => logAction("PPT 열람", item.title)} className="flex-1 bg-orange-50 text-orange-600 py-4 rounded-2xl text-[10px] font-black border border-orange-100 text-center flex items-center justify-center gap-1 hover:bg-orange-100 transition-colors"><Icon name="download" size={14}/> PPT</a>}
                                                        {item.youtubeUrl && <a href={item.youtubeUrl} target="_blank" rel="noreferrer" onClick={() => logAction("영상 시청", item.title)} className="w-full bg-red-600 text-white py-4 rounded-2xl text-xs font-black shadow-lg shadow-red-100 flex items-center justify-center gap-2 text-center hover:bg-red-700 transition-colors"><Icon name="youtube" size={16}/> 영상 시청</a>}
                                                    </div>
                                                </div>
                                            ))}
                                            {filteredDisplay.length === 0 && <p className="py-20 text-center text-slate-300 font-bold italic text-sm">등록된 콘텐츠가 없습니다.</p>}
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
